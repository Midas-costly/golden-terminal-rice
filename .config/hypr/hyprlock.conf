
general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.35
    vibrancy = 0.1686
    vibrancy_darkness = 0.8
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(229, 169, 26, 1.0)
    font_size = 84
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> $(date +"%A, %B %d") </big></b>"
    color = rgba(229, 169, 26, 0.8)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] echo "BATTERY: $(cat /sys/class/power_supply/BAT1/capacity)% [$(cat /sys/class/power_supply/BAT1/status | tr '[:lower:]' '[:upper:]')]"
    color = rgba(229, 169, 26, 0.85)
    font_size = 11
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -160
    halign = center
    valign = center
}

label {
    monitor =
    text = PILOT AUTHENTICATION // TERMINAL LOCKED
    color = rgba(229, 169, 26, 0.6)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 42
    outline_thickness = 1
    dots_size = 0.2       
    dots_spacing = 0.2     
    dots_center = true
    outer_color = rgba(229, 169, 26, 1.0)
    inner_color = rgba(0, 0, 0, 0.85)
    font_color = rgba(229, 169, 26, 1.0)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##E5A91A">PASSKEY REQUIRED...</span></i>
    hide_input = false
    position = 0, -110
    halign = center
    valign = center
}
